name: "Trigger Workflow"
description: "Trigger workflow on different branch"

inputs:
  branch:
    description: "The branch name"
    required: true
  workflow_id:
    description: "The workflow file"
    required: true
  github_token:
    description: "Github token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Trigger dev branch workflow
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: '${{ inputs.workflow_id }}',
            ref: '${{ inputs.branch }}',
            inputs: {
              triggered_by: 'main-branch',
              run_id: context.runId.toString()
            }
          });
          console.log('Triggered dev workflow');

    - name: Wait for dev workflow completion
      uses: actions/github-script@v7
      id: wait-for-dev
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          // Wait a moment for the workflow to start
          await new Promise(resolve => setTimeout(resolve, 10000));
          for (let i = 0; i < 60; i++) {
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ inputs.workflow_id }}',
              branch: '${{ inputs.branch }}',
              per_page: 1
            });
            if (data.workflow_runs.length > 0) {
              const run = data.workflow_runs[0];
              console.log(`Status: ${run.status}, Conclusion: ${run.conclusion}`);
              
              if (run.status === 'completed') {
                if (run.conclusion === 'success') {
                  console.log('Dev workflow completed successfully');
                  return;
                } else {
                  throw new Error(`Dev workflow failed: ${run.conclusion}`);
                }
              }
            }
            await new Promise(resolve => setTimeout(resolve, 30000));
          }
          throw new Error('Timeout waiting for dev workflow to complete');