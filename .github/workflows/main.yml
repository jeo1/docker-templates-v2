# .github/workflows/main.yml
name: Main Branch Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  WORKFLOW_ID: dev.yml

jobs:
  trigger-dev-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger dev branch workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowId = process.env.WORKFLOW_ID;
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref: 'dev',
              inputs: {
                triggered_by: 'main-branch',
                run_id: context.runId.toString()
              }
            });

            console.log(`Triggered workflow: ${workflowId}`);
            return response;

      - name: Wait for dev workflow completion
        uses: actions/github-script@v7
        id: wait-for-dev
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflowId = process.env.WORKFLOW_ID;
            await new Promise(resolve => setTimeout(resolve, 10000));

            let attempts = 0;
            const maxAttempts = 60;

            while (attempts < maxAttempts) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                branch: 'dev',
                per_page: 1
              });

              if (runs.data.workflow_runs.length > 0) {
                const latestRun = runs.data.workflow_runs[0];
                console.log(`Workflow status: ${latestRun.status}, conclusion: ${latestRun.conclusion}`);

                if (latestRun.status === 'completed') {
                  if (latestRun.conclusion === 'success') {
                    console.log('Workflow completed successfully');
                    return 'success';
                  } else {
                    throw new Error(`Workflow failed: ${latestRun.conclusion}`);
                  }
                }
              }

              attempts++;
              await new Promise(resolve => setTimeout(resolve, 30000));
            }

            throw new Error('Timeout waiting for workflow to complete');

  main-workflow-steps:
    runs-on: ubuntu-latest
    needs: trigger-dev-workflow
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Main workflow logic
        run: |
          echo "Dev workflow passed, continuing with main workflow..."
          # Add your main workflow steps here
