name: Renovate trigger docker-compose

on:
  pull_request:
    types:
      - opened
    branches:
      - main

env:
  MANIFEST: .github/manifest.json

jobs:
  prepare-matrix:
    if: startsWith(github.actor, 'renovate')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Extract image name and set matrix
        id: set-matrix
        shell: python
        run: |
          import json
          import os
          import re
          
          # Extract image name from PR title
          pr_title = "${{ github.event.pull_request.title }}"
          match = re.search(r'\[([^\]]*)\]', pr_title)
          if not match:
              raise ValueError("Could not extract image name from PR title")
          
          image_name = match.group(1)
          
          # Read manifest and create matrix
          with open("${{ env.MANIFEST }}") as f:
              data = json.load(f)
          
          if image_name not in data:
              raise ValueError(f"Image '{image_name}' not found in manifest")
          
          matrix = {"key": data[image_name]}
          
          # Output matrix
          with open(os.environ['GITHUB_OUTPUT'], 'a') as output:
              print(f"matrix={json.dumps(matrix)}", file=output)

  run-compose-test:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Run custom action
        uses: ./.github/actions
        with:
          branch: ${{ matrix.key.branch }}
          workflow_id: ${{ matrix.key.workflow_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

