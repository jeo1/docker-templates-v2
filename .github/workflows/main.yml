# .github/workflows/main.yml
name: zMain

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

env:
  MANIFEST: .github/manifest.json
  PR_TITLE: Update nginx Docker tag to v1.11 [nginx]

jobs:
  trigger-branch-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get branch info
        id: info
        run: |
          IMAGE_NAME=$(echo "${{ env.PR_TITLE }}" | grep -oP '\[\K[^\]]*')
          BRANCH_NAME=$(jq -r --arg k "$IMAGE_NAME" '.[$k].branch' ${{ env.MANIFEST }})
          WORKFLOW_ID=$(jq -r --arg k "$IMAGE_NAME" '.[$k].workflow_id' ${{ env.MANIFEST }})
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "WORKFLOW_ID=$WORKFLOW_ID" >> $GITHUB_OUTPUT

      - name: Trigger dev branch workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ steps.info.outputs.WORKFLOW_ID }}',
              ref: '${{ steps.info.outputs.BRANCH_NAME }}',
              inputs: {
                triggered_by: 'main-branch',
                run_id: context.runId.toString()
              }
            });
            
            console.log('Triggered dev workflow');
            
      - name: Wait for dev workflow completion
        uses: actions/github-script@v7
        id: wait-for-dev
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Wait a moment for the workflow to start
            await new Promise(resolve => setTimeout(resolve, 10000));
            
            for (let i = 0; i < 60; i++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: '${{ steps.info.outputs.WORKFLOW_ID }}',
                branch: '${{ steps.info.outputs.BRANCH_NAME }}',
                per_page: 1
              });
              
              if (data.workflow_runs.length > 0) {
                const run = data.workflow_runs[0];
                console.log(`Status: ${run.status}, Conclusion: ${run.conclusion}`);
                
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    console.log('Dev workflow completed successfully');
                    return;
                  } else {
                    throw new Error(`Dev workflow failed: ${run.conclusion}`);
                  }
                }
              }
              
              await new Promise(resolve => setTimeout(resolve, 30000));
            }
            
            throw new Error('Timeout waiting for dev workflow to complete');

