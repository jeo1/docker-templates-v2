name: Main Branch Workflow
on:
  push:
    branches: [main]

jobs:
  trigger-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger dev workflow
        run: |
          gh workflow run dev.yml --ref dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}