name: Main Branch Workflow

on:
  push:
    branches: [ main ]

jobs:
  trigger-dev-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for dev workflow
        run: sleep 60

      - name: Check dev workflow result
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dev-tests.yml',
              branch: 'dev',
              per_page: 1
            });
            
            const latestRun = runs.data.workflow_runs[0];
            if (latestRun.conclusion === 'success') {
              core.setOutput('result', 'success');
            } else {
              core.setOutput('result', 'failed');
            }

      - name: Deploy if dev tests passed
        if: steps.check.outputs.result == 'success'
        run: echo "✅ Dev tests passed! Deploying to production..."

      - name: Fail if dev tests failed
        if: steps.check.outputs.result == 'failed'
        run: |
          echo "❌ Dev tests failed!"
          exit 1