name: Main Branch Workflow

on:
  push:
    branches: [ main ]

jobs:
  trigger-dev-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dev workflow
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const triggerTime = Date.now();
            
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'trigger-dev-tests',
              client_payload: {
                main_run_id: runId,
                trigger_time: triggerTime
              }
            });
            
            console.log(`Triggered dev tests with run ID: ${runId}`);
            core.setOutput('trigger_time', triggerTime);
            core.setOutput('run_id', runId);

      - name: Wait for dev workflow to start
        uses: actions/github-script@v7
        with:
          script: |
            const triggerTime = ${{ steps.trigger.outputs.trigger_time }};
            const maxWait = 2 * 60 * 1000; // 2 minutes to start
            const startTime = Date.now();
            
            while (Date.now() - startTime < maxWait) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'dev-tests.yml',
                branch: 'dev',
                per_page: 3
              });
              
              const targetRun = runs.data.workflow_runs.find(run => 
                new Date(run.created_at).getTime() > triggerTime - 30000
              );
              
              if (targetRun) {
                console.log(`✅ Dev workflow started: ${targetRun.html_url}`);
                return;
              }
              
              console.log('⏳ Waiting for dev workflow to start...');
              await new Promise(resolve => setTimeout(resolve, 10000));
            }
            
            throw new Error('Dev workflow did not start within 2 minutes');

      - name: Wait for dev workflow to complete
        id: wait
        uses: actions/github-script@v7
        with:
          script: |
            const triggerTime = ${{ steps.trigger.outputs.trigger_time }};
            const maxWait = 8 * 60 * 1000; // 8 minutes to complete
            const startTime = Date.now();
            
            while (Date.now() - startTime < maxWait) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'dev-tests.yml',
                branch: 'dev',
                per_page: 3
              });
              
              const targetRun = runs.data.workflow_runs.find(run => 
                new Date(run.created_at).getTime() > triggerTime - 30000
              );
              
              if (targetRun && targetRun.status === 'completed') {
                console.log(`📋 Dev workflow completed with: ${targetRun.conclusion}`);
                core.setOutput('result', targetRun.conclusion);
                core.setOutput('url', targetRun.html_url);
                return;
              }
              
              if (targetRun) {
                console.log(`🔄 Dev workflow status: ${targetRun.status}`);
              }
              
              await new Promise(resolve => setTimeout(resolve, 15000));
            }
            
            throw new Error('Dev workflow did not complete within 8 minutes');

      - name: Check dev test results
        run: |
          echo "Dev workflow result: ${{ steps.wait.outputs.result }}"
          echo "Dev workflow URL: ${{ steps.wait.outputs.url }}"
          
          if [ "${{ steps.wait.outputs.result }}" != "success" ]; then
            echo "❌ Dev tests failed - stopping deployment"
            exit 1
          fi
          
          echo "✅ Dev tests passed - proceeding with deployment"

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          echo "All tests passed, safe to deploy!"
          # Add your deployment commands here