name: Main Branch Workflow

on:
  push:
    branches: [ main ]

jobs:
  trigger-dev-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dev workflow and wait for result
        uses: actions/github-script@v7
        with:
          script: |
            // Trigger dev workflow with unique identifier
            const runId = context.runId;
            const triggerTime = Date.now();
            
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'trigger-dev-tests',
              client_payload: {
                main_run_id: runId,
                trigger_time: triggerTime
              }
            });
            
            console.log(`Triggered dev tests with run ID: ${runId}`);
            
            // Wait for completion by polling recent workflow runs
            const maxWait = 10 * 60 * 1000; // 10 minutes
            const startTime = Date.now();
            
            while (Date.now() - startTime < maxWait) {
              await new Promise(resolve => setTimeout(resolve, 15000)); // Wait 15 seconds
              
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'dev-tests.yml',
                branch: 'dev',
                per_page: 5
              });
              
              // Look for run triggered after our trigger time
              const targetRun = runs.data.workflow_runs.find(run => 
                new Date(run.created_at).getTime() > triggerTime - 30000 // 30 sec buffer
              );
              
              if (targetRun) {
                console.log(`Found run: ${targetRun.html_url}, status: ${targetRun.status}`);
                
                if (targetRun.status === 'completed') {
                  if (targetRun.conclusion === 'success') {
                    console.log('✅ Dev tests passed!');
                    core.setOutput('dev_result', 'success');
                    return;
                  } else {
                    console.log('❌ Dev tests failed!');
                    core.setOutput('dev_result', 'failed');
                    throw new Error(`Dev workflow failed: ${targetRun.html_url}`);
                  }
                }
              }
            }
            
            throw new Error('Dev workflow did not complete within timeout');

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          echo "Dev tests passed, safe to deploy!"