name: Dev Tests

on:
  repository_dispatch:
    types: [trigger-dev-tests]
  push:
    branches: [ dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Main run ID: ${{ github.event.client_payload.main_run_id }}"
            echo "Trigger time: ${{ github.event.client_payload.trigger_time }}"
          fi

      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and test
        run: |
          npm install
          npm test

      - name: Build
        run: npm run build

      - name: Report completion
        if: always()
        run: |
          echo "Dev tests completed with status: ${{ job.status }}"