name: Format Python Code and Create PR

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC (optional)

jobs:
  format-and-pr:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for all branches
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install formatting tools
      run: |
        pip install black isort flake8
    
    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
    
    - name: Create new branch from dev
      run: |
        # Ensure we have the latest dev branch
        git fetch origin dev
        # Create a new branch with timestamp
        BRANCH_NAME="format-python-$(date +%Y%m%d-%H%M%S)"
        git checkout -b $BRANCH_NAME origin/dev
        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
    
    - name: Format Python files with black
      run: |
        # Format all Python files
        black . --line-length 88 --target-version py38
    
    - name: Sort imports with isort
      run: |
        # Sort imports to be compatible with black
        isort . --profile black
    
    - name: Check if there are changes
      id: check_changes
      run: |
        if git diff --quiet; then
          echo "no_changes=true" >> $GITHUB_OUTPUT
          echo "No formatting changes needed"
        else
          echo "no_changes=false" >> $GITHUB_OUTPUT
          echo "Formatting changes detected"
        fi
    
    - name: Commit changes
      if: steps.check_changes.outputs.no_changes == 'false'
      run: |
        git add .
        git commit -m "🐍 Auto-format Python code with black and isort
        
        - Applied black formatting with line length 88
        - Sorted imports with isort (black profile)
        - Automated via GitHub Actions"
    
    - name: Push branch
      if: steps.check_changes.outputs.no_changes == 'false'
      run: |
        git push origin $BRANCH_NAME
    
    - name: Create Pull Request
      if: steps.check_changes.outputs.no_changes == 'false'
      uses: actions/github-script@v6
      with:
        script: |
          const { data: pullRequest } = await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🐍 Auto-format Python code',
            head: process.env.BRANCH_NAME,
            base: 'dev',
            body: `## 🤖 Automated Python Code Formatting
            
            This PR was automatically created by GitHub Actions to format Python code.
            
            ### Changes Made:
            - ✅ Applied **black** formatting (line length: 88)
            - ✅ Sorted imports with **isort** (black profile)
            - ✅ Ensured consistent code style across the project
            
            ### Files Modified:
            All Python files (\`.py\`) in the repository have been processed.
            
            ### Review Notes:
            - This is an automated formatting change
            - No logic or functionality has been altered
            - Safe to merge after review
            
            ---
            *Generated by GitHub Actions workflow*`,
            draft: false
          });
          
          console.log('Pull Request created:', pullRequest.html_url);
          
          // Add labels if they exist
          try {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              labels: ['automated', 'formatting', 'python']
            });
          } catch (error) {
            console.log('Could not add labels (they may not exist):', error.message);
          }
    
    - name: No changes summary
      if: steps.check_changes.outputs.no_changes == 'true'
      run: |
        echo "✅ No Python formatting changes needed - code is already properly formatted!"