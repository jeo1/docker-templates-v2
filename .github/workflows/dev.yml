name: Dev Branch Workflow
on:
  repository_dispatch:
    types: [trigger-dev-workflow]
  # You can also keep other triggers
  push:
    branches: [dev]

jobs:
  dev-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
      
      - name: Run dev workflow tasks
        run: |
          echo "Triggered by: ${{ github.event.client_payload.ref }}"
          echo "From commit: ${{ github.event.client_payload.sha }}"
          # Your dev workflow steps here
          
      - name: fail
        run: |
          exit 1