services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    pull_policy: always
    init: true
    container_name: "${CONTAINER_NAME}"
    environment:
      - LOG_LEVEL=debug
      - PORT=5055
    ports:
      - "${SEERR_PORT}:5055"
    volumes:
      - "${SEERR_CONFIG}:/app/config"
    restart: unless-stopped